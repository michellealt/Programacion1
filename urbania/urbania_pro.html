<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Urbania Smart Traffic - Pro (v2)</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b1220;
            color: white;
            overflow: hidden;
        }

        /* Dashboard superior */
        .dashboard {
            position: fixed;
            top: 0;
            width: 100%;
            background: #111827;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .card {
            background: #1f2937;
            padding: 10px 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
            border: 1px solid #374151;
        }

        .count-val { font-size: 1.5rem; font-weight: bold; color: #3b82f6; }

        /* Escena de la ciudad */
        .city {
            margin-top: 150px;
            height: 100vh;
            position: relative;
            background: #1a202c;
        }

        .road {
            position: absolute;
            top: 250px;
            width: 100%;
            height: 140px;
            background: #2d3436;
            border-top: 4px solid #636e72;
            border-bottom: 4px solid #636e72;
        }

        .divider {
            position: absolute;
            top: 318px;
            width: 100%;
            height: 4px;
            background: #f1c40f;
            border-top: 2px dashed rgba(255,255,255,0.3);
        }

        /* Semáforo Estructura */
        .traffic-light-post {
            position: absolute;
            width: 40px;
            height: 100px;
            background: #2c3e50;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            top: 130px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .light-bulb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #1a1a1a;
            transition: 0.3s;
        }

        .light-bulb.red.active { background: #ff3b3b; box-shadow: 0 0 20px #ff3b3b; }
        .light-bulb.yellow.active { background: #f1c40f; box-shadow: 0 0 20px #f1c40f; }
        .light-bulb.green.active { background: #00ff88; box-shadow: 0 0 20px #00ff88; }

        #semaforoA { right: 20%; }
        #semaforoB { left: 20%; }

        .lane {
            position: absolute;
            height: 60px;
            display: flex;
            align-items: center;
            transition: all 0.5s ease;
        }

        #laneA { top: 255px; right: 5%; flex-direction: row-reverse; }
        #laneB { top: 325px; left: 5%; }

        .car {
            width: 60px;
            height: 35px;
            border-radius: 6px;
            margin: 5px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .car:hover { transform: scale(1.05); }

        .car::before, .car::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #000000;
            border-radius: 50%;
            bottom: -6px;
        }
        .car::before { left: 10px; }
        .car::after { right: 10px; }

    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <h3>Autos Derecha</h3>
        <p id="countA" class="count-val">0</p>
    </div>
    <div class="card">
        <h3>Estado Sistema</h3>
        <p id="status">Calculando flujo...</p>
    </div>
    <div class="card">
        <h3>Autos Izquierda</h3>
        <p id="countB" class="count-val">0</p>
    </div>
</div>

<div class="city">
    <div id="semaforoA" class="traffic-light-post">
        <div class="light-bulb red" id="redA"></div>
        <div class="light-bulb yellow" id="yellowA"></div>
        <div class="light-bulb green" id="greenA"></div>
    </div>

    <div id="semaforoB" class="traffic-light-post">
        <div class="light-bulb red" id="redB"></div>
        <div class="light-bulb yellow" id="yellowB"></div>
        <div class="light-bulb green" id="greenB"></div>
    </div>

    <div class="road"></div>
    <div class="divider"></div>

    <div class="lane" id="laneA"></div>
    <div class="lane" id="laneB"></div>
</div>

<script>
    let carsA = 6;
    let carsB = 5;
    let transitionInProgress = false;

    const laneA = document.getElementById("laneA");
    const laneB = document.getElementById("laneB");

    function playCarSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function updateLights(prioritizeA) {
        if(transitionInProgress) return;
        const reset = (side) => {
            document.getElementById(`red${side}`).classList.remove('active');
            document.getElementById(`yellow${side}`).classList.remove('active');
            document.getElementById(`green${side}`).classList.remove('active');
        };
        reset('A'); reset('B');

        if (prioritizeA) {
            document.getElementById('greenA').classList.add('active');
            document.getElementById('redB').classList.add('active');
            document.getElementById("status").innerText = "Prioridad: Derecha";
        } else {
            document.getElementById('redA').classList.add('active');
            document.getElementById('greenB').classList.add('active');
            document.getElementById("status").innerText = "Prioridad: Izquierda";
        }
    }

    // --- SUBTÍTULO: MANIPULACIÓN DE NODOS (MOVIMIENTO DE AUTOS) ---
    function createCar(side) {
        let car = document.createElement("div");
        car.classList.add("car");
        const colors = ["#e74c3c", "#3498db", "#f1c40f", "#9b59b6", "#e67e22"];
        car.style.background = colors[Math.floor(Math.random() * colors.length)];
        car.dataset.side = side;

        car.onclick = function() {
            playCarSound();
            
            // EXPLICACIÓN: AQUÍ USAMOS APPENDCHILD PARA MOVER EL NODO (EL AUTO) AL OTRO CARRIL
            if (this.dataset.side === "A") {
                this.dataset.side = "B";
                laneB.appendChild(this); // MUEVE EL NODO A LA IZQUIERDA
                carsA--;
                carsB++;
            } else {
                this.dataset.side = "A";
                laneA.appendChild(this); // MUEVE EL NODO A LA DERECHA
                carsB--;
                carsA++;
            }
            refreshUI();
        };
        
        if(side === "A") laneA.appendChild(car);
        else laneB.appendChild(car);
    }

    // --- SUBTÍTULO: LÓGICA DE PRIORIDAD (COMPARACIÓN DE TRÁFICO) ---
    function refreshUI() {
        document.getElementById("countA").innerText = carsA;
        document.getElementById("countB").innerText = carsB;
        
        // EXPLICACIÓN: AQUÍ SE COMPARA SI AUTOS DERECHA ES MAYOR QUE IZQUIERDA
        // SI (carsA > carsB) ES CIERTO, SE ACTIVA EL SEMÁFORO CORRESPONDIENTE
        updateLights(carsA > carsB); 
    }

    for(let i=0; i<carsA; i++) createCar("A");
    for(let i=0; i<carsB; i++) createCar("B");
    refreshUI();

</script>
</body>
</html>
